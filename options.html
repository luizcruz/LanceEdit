<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LanceEdit – Settings</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      color: #111;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 16px;
    }
    .card {
      background: white;
      border-radius: 10px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 460px;
      overflow: hidden;
    }
    .card-header {
      background: #e8192c;
      color: white;
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .card-header h1 { font-size: 18px; font-weight: 700; }
    .card-header p { font-size: 12px; opacity: 0.85; margin-top: 2px; }
    .card-body { padding: 24px; }
    .field { margin-bottom: 20px; }
    label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: #444; }
    input[type="text"] {
      width: 100%;
      padding: 9px 12px;
      border: 1.5px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="text"]:focus { border-color: #e8192c; }
    .hint { font-size: 11px; color: #888; margin-top: 4px; }
    .actions { display: flex; align-items: center; gap: 12px; margin-top: 8px; }
    button {
      padding: 9px 20px;
      background: #e8192c;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #c5151f; }
    #status { font-size: 13px; color: #2a9d8f; font-weight: 500; display: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-header">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
           stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
      </svg>
      <div>
        <h1>LanceEdit</h1>
        <p>Configure settings</p>
      </div>
    </div>
    <div class="card-body">
      <div class="field">
        <label for="siteDomain">Site Domain</label>
        <input type="text" id="siteDomain" placeholder="e.g. www.example.com">
        <div class="hint">The domain where the pencil button appears</div>
      </div>
      <div class="field">
        <label for="cmsDomain">CMS Domain</label>
        <input type="text" id="cmsDomain" placeholder="e.g. cms.example.com">
        <div class="hint">The WordPress admin domain for edit links</div>
      </div>
      <div class="field">
        <label for="rootCategoryId">Root Category ID</label>
        <input type="text" id="rootCategoryId" placeholder="e.g. 123">
        <div class="hint">WordPress term ID used for the homepage category link</div>
      </div>
      <div class="field">
        <label for="realtimeDomain">Temporeal CMS Domain</label>
        <input type="text" id="realtimeDomain" placeholder="e.g. temporeal.example.com">
        <div class="hint">Admin domain for /temporeal/partida/ and /temporeal/evento/ pages</div>
      </div>
      <div class="actions">
        <button id="saveBtn">Save</button>
        <span id="status">Saved!</span>
      </div>
    </div>
  </div>
  <script src="options.js"></script>
</body>
</html>
